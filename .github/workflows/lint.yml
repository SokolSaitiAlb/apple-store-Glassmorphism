name: Code Quality & Security

on: [push, pull_request]

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Kontrolli për HTML (Super-Linter është standard i industrisë)
      - name: HTML Hint
        run: |
          echo "Kontrolli i integritetit të HTML..."
          grep -q "<!DOCTYPE html>" index.html || (echo "Gabim: Mungon DOCTYPE!" && exit 1)

      # Kontrolli për Python (për backend-in tënd me SQLAlchemy)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Linting Tools
        run: |
          pip install flake8

      - name: Lint with flake8
        run: |
          # Kontrollon për gabime logjike dhe sintaksore në Python
          # Do të dështojë nëse ka gabime kritike
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
